name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache for PR/main CI speed. Release-tag images build with no
          # cache restore, so a versioned image never reuses layers a PR touched.
          # PR caches are also given a separate scope so they can't share keys
          # with the trusted (push) path.
          cache-from: ${{ startsWith(github.ref, 'refs/tags/') && '' || format('type=gha,scope={0}', github.event_name == 'pull_request' && 'pr' || 'push') }}
          cache-to: ${{ startsWith(github.ref, 'refs/tags/') && '' || format('type=gha,mode=max,scope={0}', github.event_name == 'pull_request' && 'pr' || 'push') }}
